<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── Page layout ── */
    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem 1rem;
    }

    /* ── Skyline silhouette ── */
    .skyline {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      opacity: 0.10;
      pointer-events: none;
    }

    /* ── Top labels ── */
    .city-label {
      font-size: 12px;
      letter-spacing: 0.35em;
      color: #ff4500;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 3rem;
      text-align: center;
    }

    /* ── Main clock ── */
    .clock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 900px;
      margin-bottom: 2rem;
    }

    .clock-section-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .digits-row {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    .digit-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .digit-value {
      font-size: clamp(44px, 7vw, 88px);
      line-height: 1;
      min-width: 1.2ch;
      text-align: center;
      transition: color 0.4s ease;
    }

    .digit-unit {
      font-size: clamp(8px, 1vw, 10px);
      letter-spacing: 0.25em;
      color: #444;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .sep {
      font-size: clamp(36px, 5.5vw, 72px);
      color: #222;
      padding: 0 6px;
      margin-bottom: 16px;
      user-select: none;
    }

    /* Climate-Clock-inspired colour progression */
    #d-years  { color: #ff4500; }
    #d-months { color: #ff6a00; }
    #d-days   { color: #ffaa00; }
    #d-hours  { color: #ffe000; }
    #d-mins   { color: #c8ff00; }
    #d-secs   { color: #00ff99; }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%;
      max-width: 900px;
      height: 5px;
      background: #181818;
      border-radius: 3px;
      overflow: hidden;
      margin: 1.5rem 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff4500 0%, #ffaa00 50%, #00ff99 100%);
      border-radius: 3px;
      width: 0%;
      transition: width 1s linear;
    }

    /* ── Date row ── */
    .dates-row {
      display: flex;
      gap: 3rem;
      font-size: 10px;
      color: #444;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dates-row .value { color: #888; }

    /* ── Footer ── */
    .footer {
      font-size: 10px;
      color: #333;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2rem;
    }

    /* ── Pulse animation on seconds ── */
    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.6; }
      100% { opacity: 1; }
    }
    #d-secs { animation: pulse 1s step-end infinite; }

    /* ── Responsive tweaks ── */
    @media (max-width: 600px) {
      .sep { display: none; }
      .digits-row { gap: 16px; }
    }
  </style>
</head>

<div class="page">
  <div class="city-label">New York City</div>
  <div class="subtitle">Time remaining in the city that never sleeps</div>

  <div class="clock-wrap">
    <div class="clock-section-label">your nyc chapter ends in</div>
    <div class="digits-row">
      <div class="digit-group">
        <div class="digit-value" id="d-years">--</div>
        <div class="digit-unit">years</div>
      </div>
      <div class="sep">:</div>
      <div class="digit-group">
        <div class="digit-value" id="d-months">--</div>
        <div class="digit-unit">months</div>
      </div>
      <div class="sep">:</div>
      <div class="digit-group">
        <div class="digit-value" id="d-days">--</div>
        <div class="digit-unit">days</div>
      </div>
      <div class="sep">:</div>
      <div class="digit-group">
        <div class="digit-value" id="d-hours">--</div>
        <div class="digit-unit">hours</div>
      </div>
      <div class="sep">:</div>
      <div class="digit-group">
        <div class="digit-value" id="d-mins">--</div>
        <div class="digit-unit">mins</div>
      </div>
      <div class="sep">:</div>
      <div class="digit-group">
        <div class="digit-value" id="d-secs">--</div>
        <div class="digit-unit">secs</div>
      </div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="dates-row">
    <span>Arrived &nbsp;<span class="value">24 Jul 2024</span></span>
    <span>Leaving &nbsp;<span class="value">24 Jul 2027</span></span>
  </div>

  <div class="footer" id="footerMsg">calculating...</div>
</div>

<script>
  const START = new Date('2024-07-24T00:00:00');
  const END   = new Date('2027-07-24T00:00:00');
  const TOTAL = END - START;

  function pad(n, w) {
    return String(Math.max(0, Math.floor(n))).padStart(w, '0');
  }

  function tick() {
    const now  = new Date();
    const diff = Math.max(0, END - now);

    // Progress
    const pct = Math.min(100, ((now - START) / TOTAL) * 100);
    document.getElementById('progressFill').style.width = pct.toFixed(3) + '%';

    // Decompose years + months remaining (calendar-aware)
    const eY = END.getFullYear(), eM = END.getMonth(), eD = END.getDate();
    const nY = now.getFullYear(), nM = now.getMonth(),  nDy = now.getDate();

    let years  = eY - nY;
    let months = eM - nM;
    if (months < 0) { years--; months += 12; }
    if (eD < nDy)   { months--; if (months < 0) { years--; months += 11; } }

    // Remaining seconds → days/hours/mins/secs
    let rem = Math.floor(diff / 1000);
    const secs  = rem % 60; rem = Math.floor(rem / 60);
    const mins  = rem % 60; rem = Math.floor(rem / 60);
    const hours = rem % 24; rem = Math.floor(rem / 24);

    // Days within current month chunk
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const days = rem % daysInMonth;

    document.getElementById('d-years').textContent  = pad(years,  1);
    document.getElementById('d-months').textContent = pad(months, 2);
    document.getElementById('d-days').textContent   = pad(days,   2);
    document.getElementById('d-hours').textContent  = pad(hours,  2);
    document.getElementById('d-mins').textContent   = pad(mins,   2);
    document.getElementById('d-secs').textContent   = pad(secs,   2);

    document.getElementById('footerMsg').textContent =
      pct.toFixed(1) + '% of your NYC chapter complete  ·  ' +
      Math.ceil(diff / 86400000) + ' total days left';
  }

  tick();
  setInterval(tick, 1000);
</script>
